<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Us | WhatsApp Leads</title>
    <meta name="description" content="Quickly reach out for support or inquiries via WhatsApp.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <section class="form-wrapper">
            <div class="form-header">
                <div class="logo">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <h1>Let's Connect</h1>
                <p>Fill out the form below and we'll reach out to you on WhatsApp.</p>
            </div>

            <form id="whatsappForm" class="lead-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" name="name" placeholder="Amit Sharma" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="amit@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="phone">WhatsApp Number</label>
                    <div class="input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="message">Your Message (Optional)</label>
                    <div class="input-icon">
                        <i class="fas fa-comment-alt"></i>
                        <textarea id="message" name="message" rows="3"
                            placeholder="Tell us more about your inquiry..."></textarea>
                    </div>
                </div>

                <button type="submit" id="mainSubmit" class="cta-btn">
                    <span>Connect Now</span>
                    <i class="fab fa-whatsapp"></i>
                </button>
            </form>

            <footer class="form-footer">
                <p>Private & Secure <i class="fas fa-shield-alt"></i></p>
                <div class="developer-credit">
                    <span>Crafted by</span>
                    <a href="https://gabglobaltech.site/" target="_blank" rel="noopener">GAB Global Tech</a>
                </div>
            </footer>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
